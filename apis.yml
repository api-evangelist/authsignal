aid: authsignal
url: https://raw.githubusercontent.com/api-evangelist/authsignal/refs/heads/main/apis.yml
name: Authsignal
kind: company
description: >-
  Authsignal is a passwordless, step-up, and risk-based authentication
  platform. The product wraps passkeys, authenticator apps (TOTP), SMS and
  WhatsApp OTP, email OTP and magic links, push notifications, biometrics
  (face / palm), and ID verification behind a unified Server API, Client API,
  and Management API. A no-code rules engine routes high-risk events through
  step-up challenges, and audit / observability surfaces every authentication
  attempt. Authsignal slots in front of existing identity providers
  (Cognito, Auth0, Azure AD B2C, Keycloak, IdentityServer, NextAuth.js) or
  works standalone.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Authentication
  - Passkeys
  - MFA
  - Step-Up
  - Passwordless
  - Risk
  - Biometrics
  - Identity Verification
created: '2026-05-23'
modified: '2026-05-23'
specificationVersion: '0.19'
apis:
  - aid: authsignal:server-api
    name: Authsignal Server API
    description: >-
      Server-to-server REST API used to track user actions, evaluate the rules
      engine, mint short-lived URLs for the pre-built authentication UI, issue
      client tokens, validate challenge results, and manage enrolled
      authenticators on behalf of users. Authenticated with the tenant secret
      (HTTP Basic with the tenant ID as username).
    humanURL: https://docs.authsignal.com/api-reference/server-api/overview
    baseURL: https://api.authsignal.com
    tags:
      - REST
      - Server
      - Actions
      - Users
      - Authenticators
    properties:
      - type: Documentation
        url: https://docs.authsignal.com/api-reference/server-api/overview
  - aid: authsignal:client-api
    name: Authsignal Client API
    description: >-
      Browser / device-facing REST API for fully custom authentication UIs.
      Supports passkeys, authenticator apps, SMS / WhatsApp OTP, email OTP,
      magic links, and push challenges. Authenticated with short-lived client
      tokens issued by the Server API.
    humanURL: https://docs.authsignal.com/api-reference/client-api/overview
    baseURL: https://api.authsignal.com
    tags:
      - REST
      - Client
      - Passkeys
      - OTP
    properties:
      - type: Documentation
        url: https://docs.authsignal.com/api-reference/client-api/overview
  - aid: authsignal:management-api
    name: Authsignal Management API
    description: >-
      REST API for tenant-level configuration: actions and rules, theme and
      branding, and other tenant settings. Authenticated with a separate
      management API key.
    humanURL: https://docs.authsignal.com/api-reference/management-api/overview
    baseURL: https://api.authsignal.com
    tags:
      - REST
      - Management
      - Configuration
      - Tenant
    properties:
      - type: Documentation
        url: https://docs.authsignal.com/api-reference/management-api/overview
  - aid: authsignal:webhooks
    name: Authsignal Webhooks
    description: >-
      Outbound webhooks delivering authentication and enrollment events,
      enabling downstream systems to react to user lifecycle changes and
      challenge outcomes.
    humanURL: https://docs.authsignal.com/concepts/webhooks
    baseURL: customer-configured
